<body>
  <h1>InstaPix Kiosks – Live</h1>
  
  <div class="card" style="display: flex; gap: 20px; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 300px;">
      <canvas id="salesChart"></canvas>
    </div>
    <div style="flex: 1; min-width: 300px;">
      <canvas id="transactionChart"></canvas>
    </div>
  </div>

  <div id="cards"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let salesChartInstance = null;
let transChartInstance = null;

async function fetchData() {
  try {
    const res = await fetch("https://instapix-proxy.vercel.app/api/proxy");
    const data = await res.json();
    render(data);
    updateCharts(data); // Call the new chart function
  } catch (e) {
    document.getElementById("cards").innerHTML =
      "<div class='card' style='color:red'>⚠️ Could not reach API</div>";
  }
}

function updateCharts(kiosks) {
  const labels = kiosks.map(k => k.description);
  const salesData = kiosks.map(k => k.totalAmount);
  const transData = kiosks.map(k => k.totalCount);

  // Sales Chart (Bar)
  const ctxSales = document.getElementById('salesChart').getContext('2d');
  if (salesChartInstance) salesChartInstance.destroy();
  salesChartInstance = new Chart(ctxSales, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '30-Day Sales (₾)',
        data: salesData,
        backgroundColor: '#3b82f6',
        borderRadius: 5
      }]
    },
    options: { responsive: true, plugins: { legend: { position: 'top' } } }
  });

  // Transactions Chart (Doughnut)
  const ctxTrans = document.getElementById('transactionChart').getContext('2d');
  if (transChartInstance) transChartInstance.destroy();
  transChartInstance = new Chart(ctxTrans, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        label: 'Total Transactions',
        data: transData,
        backgroundColor: ['#facc15', '#22c55e', '#ef4444', '#a855f7']
      }]
    },
    options: { responsive: true, plugins: { title: { display: true, text: 'Transaction Share' } } }
  });
}

// ... Keep your existing progressBar and render functions exactly as they are ...
function progressBar(value, max) {
  const pct = max ? Math.round((value / max) * 100) : 0;
  let color = '#22c55e';
  if (pct <= 50) color = '#ef4444';
  else if (pct <= 75) color = '#facc15';
  return `<div class="bar" style="width:${pct}%;background:${color}"></div>`;
}

function render(kiosks) {
  const box = document.getElementById("cards");
  box.innerHTML = "";
  kiosks.forEach(k => {
    const isOnline = new Date() - new Date(k.lastActive) < 5 * 60 * 1000;
    const status = isOnline ? '<span class="badge online">ONLINE</span>' : '<span class="badge offline">OFFLINE</span>';
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h2>${k.description} ${status}</h2>
      <table>
        <tr><th>Last 30-day sales</th><td>₾ ${k.totalAmount.toLocaleString()}</td></tr>
        <tr><th>Transactions</th><td>${k.totalCount}</td></tr>
        <tr><th>Smartphone prints</th><td>${k.quantity}</td></tr>
        <tr><th>Booth-camera prints</th><td>${k.byCameraQuantity}</td></tr>
        <tr>
          <th>Media Left</th>
          <td>
            ${k.mediaCounter} / 700
            ${progressBar(k.mediaCounter, 700)}
          </td>
        </tr>
        <tr><th>Last Client</th><td>${new Date(k.lastOperationDate).toLocaleString()}</td></tr>
      </table>
    `;
    box.appendChild(div);
  });
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
