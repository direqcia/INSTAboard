<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>InstaPix Live Dashboard</title>
  <meta http-equiv="refresh" content="60">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <style>
    body{font-family:system-ui,Arial;background:#f5f7fa;margin:0;padding:1rem}
    .card{background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.05);margin:1rem 0;padding:1.5rem}
    .badge{padding:.3rem .7rem;border-radius:20px;font-size:.75rem;font-weight:700;color:#fff;vertical-align:middle;margin-left:8px}
    .online{background:#22c55e}.offline{background:#ef4444}
    .bar-bg{height:8px;border-radius:4px;background:#e2e8f0;margin-top:10px;overflow:hidden;width:100%}
    .progress{height:100%;transition:width 0.5s ease-in-out}
    h2{margin:0;font-size:1.4rem;color:#1e293b}
    .count-label{font-size:0.75rem; color:#64748b; text-transform:uppercase; letter-spacing:1px}
    .count-value{font-size:2.5rem; font-weight:900; color:#3b82f6; line-height:1}
    .nav-btn{background:#fff; border:1px solid #cbd5e1; padding:0.6rem 2rem; border-radius:8px; font-weight:bold; color:#334155; cursor:pointer; transition:0.2s;}
    .nav-btn:hover{background:#f1f5f9;}
  </style>
</head>
<body>
  <h1 style="color:#0f172a">InstaPix – Daily Prints</h1>
  <div id="cards"></div>

<script>
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbw2uKZ4HvDqKrTScKQ8YuluCCwPc1vLG7DXAujSGmi1yM19PYMQWmeAAGpss_YyvkyY/exec"; // შენი Web App URL

async function fetchData() {
  try {
    const [liveRes, dbRes] = await Promise.all([
      fetch("https://instapix-proxy.vercel.app/api/proxy"),
      fetch(GOOGLE_URL)
    ]);
    const live = await liveRes.json();
    const dbData = await dbRes.json();
    
    const counts = dbData.today || {};
    const history = dbData.history || {};
    
    render(live, counts, history);
  } catch (e) { console.error("Update failed", e); }
}

function render(kiosks, counts, history) {
  const box = document.getElementById("cards");
  box.innerHTML = "";

  kiosks.forEach(k => {
    const prints = counts[k.description] || 0;

    let timeSincePrint = "N/A";
    if (k.lastOperationDate) {
      const printDate = new Date(k.lastOperationDate);
      const now = new Date();
      const diffMs = now - printDate;
      
      if (diffMs > 0) {
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMins / 60);
        const remainingMins = diffMins % 60;
        
        if (diffHours > 0) {
          timeSincePrint = `${diffHours}h ${remainingMins}m ago`;
        } else {
          timeSincePrint = `${diffMins}m ago`;
        }
      } else {
        timeSincePrint = "Just now";
      }
    }

    let isOnline = false;
    let adjustedStr = "N/A";

    if (k.lastActive) {
      const activeDate = new Date(k.lastActive);
      isOnline = new Date() - activeDate < 5 * 60 * 1000;
      adjustedStr = activeDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    } else {
      isOnline = new Date() - new Date(k.lastActive) < 5 * 60 * 1000;
    }

    const status = isOnline ? '<span class="badge online">ONLINE</span>' : '<span class="badge offline">OFFLINE</span>';
    
    const total = k.quantity + k.byCameraQuantity;
    let smartPct = 0;
    let boothPct = 0;
    
    if (total > 0) {
      smartPct = Math.round(((k.quantity / total) * 100) / 5) * 5;
      boothPct = 100 - smartPct;
    }

    const mediaPct = (k.mediaCounter / 700) * 100;
    const barColor = mediaPct < 25 ? '#ef4444' : mediaPct < 60 ? '#facc15' : '#22c55e';

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
       <div style="display:flex; justify-content:space-between; align-items:center">
          <div style="flex:1">
             <h2>${k.description}${status}</h2>
             <div style="margin-top:8px">
               <small style="color:#64748b">Paper Level: <b>${k.mediaCounter} / 700</b></small>
               <div class="bar-bg" style="height:8px; border-radius:4px; background:#e2e8f0; margin-top:10px; overflow:hidden; width:100%;">
                 <div class="progress" style="width:${mediaPct}%; background:${barColor}; height:100%;"></div>
               </div>
             </div>
              <div style="margin-top:10px; font-size:0.75rem; color:#475569">
              <b>Sources:</b> Smartphone ${smartPct}% | Booth ${boothPct}%
             </div>
          </div>
          <div style="text-align:right; min-width:120px">
            <div class="count-label">Today's Prints</div>
            <div class="count-value">${prints}</div>
          </div>
       </div>
       <div style="margin-top:15px; font-size:0.8rem; color:#94a3b8; border-top:1px solid #f1f5f9; padding-top:10px">
          Last Heartbeat: ${adjustedStr} | 30d Total: ₾${k.totalAmount}
          <div style="margin-top:4px; color:#64748b">
            Last Print: ${timeSincePrint}
          </div>
       </div>
     `;
    box.appendChild(div);
  });

  const historyDiv = document.createElement("div");
  historyDiv.className = "card";
  historyDiv.innerHTML = `
    <h2>📅 ისტორიული პრინტები</h2>
    <div style="margin: 20px 0; max-height: 380px;">
      <canvas id="statsChart"></canvas>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:25px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
      <button class="nav-btn" onclick="alert('უკან გადასვლა')">&lt; უკან</button>
      <button class="nav-btn" onclick="alert('წინ გადასვლა')">წინ &gt;</button>
    </div>
  `;
  
  box.appendChild(historyDiv);

  // მონაცემების მომზადება
  const chartLabels = ['29 აპრ', '30 აპრ', '1 მაი', '2 მაი', '3 მაი', '4 მაი', '5 მაი'];
  const chartPark = [4, 7, 4, 3, 9, 6, 4];
  const chartKU = [7, 35, 11, 17, 11, 9, 7];
  const chartLisi = [13, 28, 17, 25, 16, 12, 13];
  const chartTotals = [24, 70, 32, 45, 36, 27, 24]; // ჯამები

  setTimeout(() => {
    const ctx = document.getElementById('statsChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      plugins: [ChartDataLabels],
      data: {
        labels: chartLabels,
        datasets: [
          {
            label: 'Park',
            data: chartPark,
            backgroundColor: '#ef4444'
          },
          {
            label: 'KU',
            data: chartKU,
            backgroundColor: '#3b82f6'
          },
          {
            label: 'Lisi',
            data: chartLisi,
            backgroundColor: '#22c55e'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            stacked: true,
            grid: { display: false }
          },
          y: {
            stacked: true,
            beginAtZero: true,
            max: 45, // მაქსიმალური ზღვარი ვიზუალისთვის
            grid: { color: '#f1f5f9' }
          }
        },
        plugins: {
          legend: {
            display: true,
            position: 'top'
          },
          // აჩვენებს ჯამებს სვეტების თავზე
          datalabels: {
            color: '#0f172a',
            anchor: 'end',
            align: 'top',
            font: { weight: 'bold', size: 14 },
            formatter: function(value, context) {
              const datasetIndex = context.datasetIndex;
              if (datasetIndex === 2) { // მხოლოდ ბოლო სვეტზე
