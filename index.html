<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>InstaPix Live Dashboard</title>
  <meta http-equiv="refresh" content="60">
  <style>
    body{font-family:system-ui,Arial;background:#f5f7fa;margin:0;padding:1rem}
    .card{background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.05);margin:1rem 0;padding:1.5rem}
    .badge{padding:.3rem .7rem;border-radius:20px;font-size:.75rem;font-weight:700;color:#fff;vertical-align:middle;margin-left:8px}
    .online{background:#22c55e}.offline{background:#ef4444}
    .bar-bg{height:8px;border-radius:4px;background:#e2e8f0;margin-top:10px;overflow:hidden;width:100%}
    .progress{height:100%;transition:width 0.5s ease-in-out}
    h2{margin:0;font-size:1.4rem;color:#1e293b}
    .count-label{font-size:0.75rem; color:#64748b; text-transform:uppercase; letter-spacing:1px}
    .count-value{font-size:2.5rem; font-weight:900; color:#3b82f6; line-height:1}
  </style>
</head>
<body>
  <h1 style="color:#0f172a">InstaPix – Daily Prints</h1>
  <div id="cards"></div>

<script>
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbw2uKZ4HvDqKrTScKQ8YuluCCwPc1vLG7DXAujSGmi1yM19PYMQWmeAAGpss_YyvkyY/exec"; // Your Web App URL

async function fetchData() {
  try {
    const [liveRes, dbRes] = await Promise.all([
      fetch("https://instapix-proxy.vercel.app/api/proxy"),
      fetch(GOOGLE_URL)
    ]);
    const live = await liveRes.json();
    const counts = await dbRes.json();
    render(live, counts);
  } catch (e) { console.error("Update failed", e); }
}

function render(kiosks, counts) {
  const box = document.getElementById("cards");
  box.innerHTML = "";

  kiosks.forEach(k => {
    const prints = counts[k.description] || 0;
    const isOnline = new Date() - new Date(k.lastActive) < 5 * 60 * 1000;
    const status = isOnline ? '<span class="badge online">ONLINE</span>' : '<span class="badge offline">OFFLINE</span>';
    
    // Calculate Percentages rounded to 5%
    const total = k.quantity + k.byCameraQuantity;
    let smartPct = 0;
    let boothPct = 0;
    
    if (total > 0) {
      // Round to nearest 5: Math.round(val / 5) * 5
      smartPct = Math.round(((k.quantity / total) * 100) / 5) * 5;
      boothPct = 100 - smartPct; // Ensures they always hit 100% total
    }

    const mediaPct = (k.mediaCounter / 700) * 100;
    const barColor = mediaPct < 25 ? '#ef4444' : mediaPct < 60 ? '#facc15' : '#22c55e';

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div style="flex:1">
          <h2>${k.description}${status}</h2>
          <div style="margin-top:8px">
            <small style="color:#64748b">Paper Level: <b>${k.mediaCounter} / 700</b></small>
            <div class="bar-bg"><div class="progress" style="width:${mediaPct}%; background:${barColor}"></div></div>
          </div>
          <div style="margin-top:10px; font-size:0.75rem; color:#475569">
            <b>Sources:</b> Smartphone ${smartPct}% | Booth ${boothPct}%
          </div>
        </div>
        <div style="text-align:right; min-width:120px">
          <div class="count-label">Today's Prints</div>
          <div class="count-value">${prints}</div>
        </div>
      </div>
      <div style="margin-top:15px; font-size:0.8rem; color:#94a3b8; border-top:1px solid #f1f5f9; padding-top:10px">
         Last Heartbeat: ${new Date(k.lastActive).toLocaleTimeString()} | 30d Total: ₾${k.totalAmount}
      </div>
    `;
    box.appendChild(div);
  });
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
